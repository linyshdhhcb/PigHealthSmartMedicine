server:
  port: 8082
  servlet:
    context-path: /api/ragent

spring:
  application:
    name: PigHealthSmartMedicine

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: root
    password: lpy.3826
    url: jdbc:mysql://127.0.0.1:3306/PigHealthSmartMedicine?characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    hikari:
      connection-test-query: select 1
      connection-timeout: 20000
      idle-timeout: 300000
      maximum-pool-size: 5
      minimum-idle: 5

  data:
    redis:
      host: 127.0.0.1
      port: 5379
      password: lpy.3826

milvus:
  uri: http://127.0.0.1:19530

rag:
  default:
    collection-name: rag_default_store
    dimension: 4096
    metric-type: COSINE

  query-rewrite:
    enabled: true
    max-history-messages: 4
    max-history-chars: 500

  rate-limit:
    global:
      enabled: true
      max-concurrent: 1
      max-wait-seconds: 3
      lease-seconds: 30
      poll-interval-ms: 200

  memory:
    history-keep-turns: 4
    summary-start-turns: 5
    summary-enabled: true
    ttl-minutes: 60
    summary-max-chars: 200
    title-max-length: 30

  knowledge:
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60

  mcp:
    servers:
      - name: default
        url: http://localhost:8081

  search:
    channels:
      vector-global:
        confidence-threshold: 0.6
        top-k-multiplier: 3
      intent-directed:
        min-intent-score: 0.4
        top-k-multiplier: 2

  trace:
    enabled: true
    max-error-length: 1000
ai:
  providers:
    ollama:
      url: http://127.0.0.1:11434
      endpoints:
        chat: /api/chat
        embedding: /api/embed

  chat:
    default-model: qwen2.5:7b  # 改为你已安装的模型
    deep-thinking-model: qwen2.5:7b  # 可选
    candidates:
      - id: qwen-plus
        provider: bailian
        model: qwen-plus-latest
        priority: 1
      - id: qwen3-max
        provider: bailian
        model: qwen3-max
        supports-thinking: true
        priority: 3
      - id: glm-4.7
        provider: siliconflow
        model: Pro/zai-org/GLM-4.7
        supports-thinking: true
        priority: 0
      - id: qwen-local  # 改个ID更清晰
        provider: ollama
        model: qwen2.5:7b  # 使用你已安装的模型
        priority: 2

  embedding:
    default-model: nomic-embed-text  # 使用你已安装的嵌入模型
    candidates:
      - id: qwen-emb-8b
        provider: siliconflow
        model: Qwen/Qwen3-Embedding-8B
        dimension: 4096
        priority: 1
      - id: nomic-embed-local  # 本地嵌入模型
        provider: ollama
        model: nomic-embed-text:latest  # 使用你已安装的nomic模型
        dimension: 768  # nomic-embed-text 的维度是768
        priority: 2
      - id: qwen-emb-local
        provider: ollama
        model: qwen2.5:7b  # qwen2.5也可以用作嵌入，但效果可能不如专门的嵌入模型
        dimension: 4096
        priority: 3  # 优先级调低

  rerank:
    default-model: qwen3-rerank
    candidates:
      - id: qwen3-rerank
        provider: bailian
        model: qwen3-rerank
        priority: 1
      - id: rerank-noop
        provider: noop
        model: noop
        priority: 100

rustfs:
  url: http://127.0.0.1:9002
  access-key-id: rustfsadmin
  secret-access-key: rustfsadmin

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: false
  token-style: simple-uuid
  is-log: false
  is-print: false
